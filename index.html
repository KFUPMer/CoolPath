<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoolPath — KFUPM Campus Navigator</title>
  <link rel="stylesheet" href="lib/leaflet.css"/>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Critical layout — inline so it always applies regardless of server */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body  { display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background: #0d1117; color: #e6edf3; font-family: sans-serif; }
    .topbar { height: 60px; display: flex; align-items: center; flex-shrink: 0;
              background: #161b22; border-bottom: 1px solid #30363d;
              padding: 0 20px; gap: 14px; }
    #map    { flex: 1; min-height: 0; }
    .route-card    { position: fixed !important; bottom: 76px; left: 20px; z-index: 1000;
                     width: 300px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    .corridors-panel { position: fixed !important; right: 20px; top: 72px; z-index: 1000;
                       width: 272px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    .legend        { position: fixed !important; bottom: 20px; left: 20px; z-index: 1000;
                     background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px 14px; }
    .layer-panel   { position: fixed !important; bottom: 20px; right: 20px; z-index: 1000;
                     background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px 14px; }
    .route-card.hidden, .route-comparison.hidden { display: none !important; }
    .panel-body.collapsed { max-height: 0 !important; overflow: hidden; }
  </style>
</head>
<body class="" aria-label="CoolPath KFUPM Campus Navigator">

  <!-- Screen reader live region -->
  <div id="sr-announce" aria-live="polite" aria-atomic="true"
       style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

  <header class="topbar" role="banner">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true"></div>
      <div class="brand-text">
        <span class="brand-name">CoolPath</span>
        <span class="brand-sub">KFUPM Campus Navigator</span>
      </div>
    </div>

    <div class="controls" role="search" aria-label="Route finder">
      <div class="select-group">
        <label for="origin">From</label>
        <select id="origin" aria-label="Origin building"></select>
      </div>
      <div class="controls-arrow" aria-hidden="true">&#8594;</div>
      <div class="select-group">
        <label for="destination">To</label>
        <select id="destination" aria-label="Destination building"></select>
      </div>

      <div class="mode-toggle" role="group" aria-label="Route mode">
        <button id="btn-shortest"   class="mode-btn active" onclick="setMode('shortest')"   aria-pressed="true">Shortest</button>
        <button id="btn-coolest"    class="mode-btn"        onclick="setMode('coolest')"    aria-pressed="false">Coolest</button>
        <button id="btn-accessible" class="mode-btn"        onclick="setMode('accessible')" aria-pressed="false" title="Wheelchair-accessible routes only">Accessible</button>
      </div>

      <button id="btn-go" class="go-btn" onclick="findAndDrawRoute()" aria-label="Find route">Find Route</button>
    </div>
  </header>

  <div id="map" role="application" aria-label="KFUPM campus map"></div>

  <!-- Route Info Card -->
  <div id="route-card" class="route-card hidden" role="region" aria-label="Route details">
    <div class="route-card-header">
      <div class="route-mode-badge" id="route-mode-badge">Shortest Route</div>
      <button class="close-btn" onclick="clearRoute()" aria-label="Clear route">&#10005;</button>
    </div>
    <div class="route-stats">
      <div class="stat-item">
        <div class="stat-val" id="stat-distance">&#8212;</div>
        <div class="stat-lbl">Distance</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-val" id="stat-shade">&#8212;</div>
        <div class="stat-lbl">Avg Shade</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-val" id="stat-time">&#8212;</div>
        <div class="stat-lbl">Walk Time</div>
      </div>
    </div>
    <div class="route-path-display" id="route-path-display"></div>
    <div id="route-comparison" class="route-comparison hidden"></div>
    <div id="route-access-info" class="route-access-info hidden"></div>
  </div>

  <!-- Exposed Corridors Panel -->
  <div id="corridors-panel" class="corridors-panel" role="complementary" aria-label="Most exposed corridors">
    <div class="panel-header" onclick="togglePanel()" role="button" tabindex="0" aria-expanded="true">
      <span class="panel-title">Top 5 Most Exposed Corridors</span>
      <span class="panel-toggle-icon" id="panel-toggle-icon" aria-hidden="true">&#9650;</span>
    </div>
    <div id="panel-body" class="panel-body"></div>
    <div class="panel-footer">For facilities &amp; planning</div>
  </div>

  <!-- Map Legend -->
  <div class="legend" role="note" aria-label="Map legend">
    <div class="legend-title">Shade Level</div>
    <div class="legend-item"><span class="legend-dot shaded"  aria-hidden="true"></span> Shaded (70–100)</div>
    <div class="legend-item"><span class="legend-dot partial" aria-hidden="true"></span> Partial (40–69)</div>
    <div class="legend-item"><span class="legend-dot exposed" aria-hidden="true"></span> Exposed (0–39)</div>
    <div class="legend-item legend-access"><span class="legend-dot inaccessible" aria-hidden="true"></span> Inaccessible</div>
  </div>

  <!-- Layer Controls -->
  <div class="layer-panel" role="group" aria-label="Map layer controls">
    <div class="layer-panel-title">Layers</div>
    <label class="layer-toggle">
      <input type="checkbox" id="toggle-heatmap"  onchange="toggleHeatmap(this.checked)">
      <span class="layer-label">Urban Heatmap</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="toggle-density"  onchange="toggleDensity(this.checked)">
      <span class="layer-label">Crowd Density</span>
    </label>
    <label class="layer-toggle">
      <input type="checkbox" id="toggle-contrast" onchange="toggleContrast(this.checked)">
      <span class="layer-label">High Contrast</span>
    </label>
  </div>

  <script src="lib/leaflet.js"></script>
  <script src="data/paths.js"></script>
  <script src="app.js"></script>
</body>
</html>
